name: Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pixelvault
          POSTGRES_PASSWORD: pixelvault
          POSTGRES_DB: pixelvault
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      minio:
        image: minio/minio
        env:
          MINIO_ROOT_USER: S3RVER
          MINIO_ROOT_PASSWORD: S3RVER-PASSWORD
        ports:
          # Map to 4569 to match the local development docker-compose.yml 
          # and the hardcoded client port in src/config/s3.js
          - 4569:9000
        command: server /data
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      PORT: 3000
      NODE_ENV: development
      DATABASE_URL: postgresql://pixelvault:pixelvault@localhost:5432/pixelvault
      # Dummy secrets to allow the app to sign tokens and run normally in CI without needing repo configuration
      JWT_ACCESS_SECRET: ci-access-secret-test
      JWT_REFRESH_SECRET: ci-refresh-secret-test
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      S3_ENDPOINT: http://localhost:4569
      S3_BUCKET: pixelvault-media
      S3_ACCESS_KEY: S3RVER
      S3_SECRET_KEY: S3RVER-PASSWORD
      S3_REGION: us-east-1
      S3_FORCE_PATH_STYLE: 'true'
      SIGNED_URL_EXPIRY: '900'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: npm test
